name: Current
options:
  bundleIdPrefix: com.richardknop
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  defaultConfig: Debug

settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

configs:
  Debug: debug
  Release: release

targets:
  Current:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Current
        excludes:
          - "Resources/**"
    resources:
      - path: Current/Resources/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.richardknop.current
        PRODUCT_NAME: Current
        INFOPLIST_FILE: Current/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Current/Resources/Current.entitlements
        SWIFT_VERSION: "5.10"
        ENABLE_HARDENED_RUNTIME: YES
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    dependencies:
      - package: GRDB
        product: GRDB
    scheme:
      testTargets: []

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    exactVersion: "7.5.0"
